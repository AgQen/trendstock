name: Weekly Prompt Tuning

# 매주 일요일 KST 07:30 (UTC 22:30 토요일)
# 누적 적중률 → 자동 prompt 튜닝 → commit
on:
  schedule:
    - cron: "30 22 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet anthropic

      - name: Install deps
        run: pip install --quiet yfinance anthropic

      - name: Weight auto-tune (skips if already tuned this month or <30 verified)
        run: python -m collectors.weight_tune
        continue-on-error: true

      - name: Export web JSON (refresh weights in JSON)
        run: python -m collectors.export_web
        continue-on-error: true

      - name: Run prompt tuning (skips if no API key or <20 30d data)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m llm.tune
        continue-on-error: true

      - name: Commit & push
        run: |
          git config user.name "trendstock-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add data.db docs/data/analysis.json llm/prompt.py llm/prompt_history.md || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "weekly tune $(date -u +%Y-%m-%d)"
            git push
          fi
